<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Princess's Mood</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Princess's Mood</h1>
  </header>

  <main>
    <section class="chart-wrap">
      <div class="mood-chart">
        <img id="moodStrip" src="assets/mood.png" alt="mood chart" />
        <img id="princess" src="assets/princess.png" alt="princess" />
      </div>
      <div class="slider-wrap">
        <input id="slider" type="range" min="1" max="7" value="4" step="1" />
        <div class="ticks">
          <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Made for GitHub Pages. Live updates enabled with GitHub Realtime (with a BroadcastChannel fallback).</p>
  </footer>

  <script src="realtime.js"></script>
  <script src="script.js"></script>
</body>
</html>
